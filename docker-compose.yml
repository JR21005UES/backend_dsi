services:

  # Base de datos MySQL
  db:
    image: mysql:8.0
    container_name: ues_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-ues_db}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-ues_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-ues_pass}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Laravel
  backend:
    build: .
    container_name: ues_backend
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-ues_db}
      DB_USERNAME: ${DB_USERNAME:-ues_user}
      DB_PASSWORD: ${DB_PASSWORD:-ues_pass}

volumes:
  db_data:
